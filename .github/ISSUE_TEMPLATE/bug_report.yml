name: Bug Report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: LLM Assistant version
      placeholder: "v1.01"
    validations:
      required: true

  - type: input
    id: server
    attributes:
      label: LLM server
      placeholder: "LM Studio / Ollama / llama.cpp / Jan"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model name
      placeholder: "qwen/qwen3-coder-30b"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 15"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Load a file
        3. ...
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Error message or traceback
      render: shell
