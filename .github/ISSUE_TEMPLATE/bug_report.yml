name: Bug report
description: Сообщить о воспроизводимой ошибке
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Не прикладывайте API-ключи, .env и приватные сессии."
  - type: input
    id: version
    attributes:
      label: Версия
      placeholder: v17.0.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: ОС и версия Python
      placeholder: Windows 11, Python 3.11.9
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
  - type: textarea
    id: logs
    attributes:
      label: Логи без секретов
      render: shell
